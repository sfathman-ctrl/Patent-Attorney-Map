lat fees, clearly communicated strategic advice, and results that rival the best firms in the country. Our mission isn't just to file patents; it's to give inventors the confidence and clarity they need to protect their ideas and take the next step.", "headshot": "Picture"}, {"name": "Josh Soloway", "firm": "Soloway Group PC", "city": "New York City", "state": "NY", "summary": "As Managing Partner of Soloway Group, Joshua Soloway advises founders, entrepreneurs, and growing businesses on trademark protection, brand strategy, and business formation. Joshua brings a business-first perspective shaped by years of experience as an attorney, entrepreneur, and former chief legal officer, helping clients make informed decisions early and avoid common structural and branding pitfalls as they scale.", "headshot": "Picture"}, {"name": "Nathaniel A. Wickliffe", "firm": "The Inventor's Friend", "city": "Manchester", "state": "NH", "summary": "the inventors Friend is a flat-fee legal services firm designed to help small business owners obtain the strongest possible IP protection for their ideas and inventions before taking them to market. Nate has worked with clients ranging from international corporations with large, global patent portfolios to individual inventors applying for a single patent on their first invention.", "headshot": "Picture"}, {"name": "Joey Vitale", "firm": "Indie Law", "city": "Chicago", "state": "IL", "summary": "Joey Vitale is an award-winning trademark attorney and internationally renowned speaker. He's on a mission to give peace of mind to 100,000 entrepreneurs. Joey is the founder of Indie Law, a top-rated trademark law firm that's helped thousands of business owners protect their brands.", "headshot": "Picture"}, {"name": "Ben Williams", "firm": "Williams Intellectual Property", "city": "Littleton", "state": "CO", "summary": "Ben Williams is a registered patent attorney and California-licensed lawyer with a hard-science background rooted in chemistry, biology, and physics through his work in soil science and environmental systems. He trained in patent law at a high-volume patent firm before putting himself through law school and being admitted to the California Bar in 2022, then founding Williams Intellectual Property. He is also an award-winning journalist and writer, a background that shows up in the clarity and strength of his patent work.", "headshot": "Picture"}, {"name": "Howard Russell", "firm": "Howard Russell, Attorney at Law", "city": "Portland", "state": "OR", "summary": "Howard has over 30 years of legal experience, both with larger firms and serving as a patent and trademark attorney with my own firm. He has helped hundreds of clients, large and small, to secure patent and trademark rights, including patent rights that are primarily in electronics, software, including several AI initiatives, mechanical, computer systems, and method patents. ", "headshot": "Picture"}, {"name": "Michael Dilworth", "firm": "Dilworth IP", "city": "New Haven", "state": "CT", "summary": "Experienced patent attorney with over 30 years protecting innovations for startups and multinational companies. Has drafted and prosecuted hundreds of patent applications across mechanical devices, chemical technologies, and consumer products, specializing in strategic patent protection that builds competitive advantages and supports commercialization goals.", "headshot": "Picture"}, {"name": "Peter Weinstein", "firm": "Omnus Law", "city": "Austin", "state": "TX", "summary": "Peter D. Weinstein, Ph.D., J.D. leads a robust legal practice that specializes in Intellectual Property, Corprate Law, and Litigation that focuses on delivering results for clients at an affordable price in a reasonable period of time. Dr. Weinstein is also a co-founder and CEO of Circurna, Inc., developing circular RNA therapeutics. Through this role he has been involved in every aspect of starting and building a company, making him not just an attorney but an entrepreneur as well. ", "headshot": "Picture"}, {"name": "Thomas Phung", "firm": "Johnson and Phung PLLC", "city": "St. Paul", "state": "MN", "summary": "We are a Midwest patent and trademark law firm committed to helping clients with their Intellectual Property Law needs. Including obtaining and defending U.S. and International patents, trademark and copyright protection that fits their needs in a timely, hands-on, cost-effective manner.", "headshot": "Picture"}, {"name": "Bao Tran", "firm": "Patent Professional Corporation", "city": "Santa Clara", "state": "CA", "summary": "Bao Tran is a patent attorney that can protect innovation of any complexity. At PatentPC, Bao has led high stakes patent and trade secret matters, architected actionable IP strategies, and built AI enabled tools that modernize how innovators protect and commercialize their work. Known for his systems thinking and adversarial analysis, he helps founders build IP moats that scale with their ambition.", "headshot": "Picture"}, {"name": "Derrick Davis", "firm": "Trust Tree", "city": "Nashville", "state": "TN", "summary": "Derrick is a Tennessee-based intellectual property attorney who helps businesses navigate questions concerning IP acquisition and enforcement. He has handled thousands of USPTO trademark filings along with over a hundred trademark disputes before the Trademark Trial and Appeal Board and federal courts throughout the United States. Derrick is an active voice in the IP community, mentoring startups through various accelerator programs and serving on the Trademark Reporter Committee of the International Trademark Association.", "headshot": "Picture"}, {"name": "Craige Thompson JD, MBA, EE, PE", "firm": "Thompson Patent Law", "city": "Cedar Park", "state": "TX", "summary": "Your innovation creates value when it is structured to produce revenue. Managing Principal Patent Attorney Craige Thompson leads a multidisciplinary team of experienced patent attorneys who engineer patents to be your strategic business assets so you can capture value, create leverage, and maximize ROI.", "headshot": "Picture"}, {"name": "Wayne Carroll", "firm": "Inspired Idea Solutions", "city": "Phoenix", "state": "AZ", "summary": "Registered patent attorney with 20+ years safeguarding clients' intellectual property. Admitted to the USPTO with expertise in patents, trademarks, trade secrets, contracts, and copyright. Board Member of the Inventors Association of Arizona, SEED SPOT mentor, and SCORE Arizona speaker.", "headshot": "Picture"}, {"name": "Mark Trenner", "firm": "Trenner Law Firm", "city": "Golden", "state": "CO", "summary": "With over 25 years of experience and a strong engineering background, I provide inventors and small businesses with expert guidance to protect their innovations and brands. I prioritize a personalized, flat-fee approach so my clients can focus on growth without the stress of unpredictable billable hours.", "headshot": "Picture"}, {"name": "Robert McConnell", "firm": "McConnell Law Firm", "city": "Los Angeles", "state": "CA", "summary": "Experienced patent attorney specializing in strategic intellectual property protection. Using data driven approaches and modern patent analytics to help innovators secure their ideas and build competitive advantages in the marketplace.", "headshot": "Picture"}, {"name": "Marcos E. Garciaacosta", "firm": "Marcos E. Garciaacosta Law Group", "city": "Mesa", "state": "AZ", "summary": "Attorney and engineer working to preserve and increase wealth for businesses of all sizes. Patent and Trademark attorney with solid background in the semiconductor industry and high tech in general.", "headshot": "Picture"}, {"name": "Bruce Hare", "firm": "Genius Patent APC", "city": "San Diego", "state": "CA", "summary": "Bruce has almost 20 years of experience as a patent attorney, working with a variety of technologies. He received a BS EE from Worcester Polytechnic Institute and worked as an engineer in the semiconductor industry before graduating from University of San Diego School of Law and becoming a patent attorney.", "headshot": "Picture"}, {"name": "Barry Kaplan", "firm": "Kaplan Intellectual Property Law, LLC", "city": "Atlanta", "state": "GA", "summary": "For more than 30 years, Barry has represented early-stage and market leading clients in fields such as high-tech, clean/green-tech, energy, medical devices, packaging, construction, and consumer goods. As a registered patent attorney, Barry assists his clients with patents, trademarks, copyrights, trade secrets, unfair competition, IP litigation, licensing, and more.", "headshot": "Picture"}, {"name": "Daniel Ross, Esq.", "firm": "Daniel Ross & Associates LLC", "city": "Cleveland", "state": "OH", "summary": "As founder of Daniel Ross and Associates, I help entrepreneurs, startups, and growing companies protect what they're building with practical, business-minded legal counsel. My practice focuses on trademarks, copyrights, contracts, business formation, and business transactions. I believe clients should have direct access to their attorney and guidance that is clear, responsive, and grounded in real business goals.", "headshot": "Picture"}, {"name": "Adam Philipp", "firm": "AEON Law", "city": "Seattle", "state": "WA", "summary": "I founded our firm so our team could remove the fear and uncertainty that clients have about revealing their creations.", "headshot": "nan"}, {"name": "Patrick Richards", "firm": "Patrick Richards", "city": "Chicago", "state": "IL", "summary": "Patrick is rare blend of lawyer, entrepreneur, and teacher. He has been a partner in two multi-national law firms, managing patent and trademark portfolios for some of the world's largest companies. In between, he started, and spent over a decade managing, a small IP-focused law firm providing services to startups and entrepreneurs. In addition, Patrick has co-founded two tech companies and spent five years teaching at Northwestern University.", "headshot": "Picture"}, {"name": "Adam Bell", "firm": "Bell IP Law", "city": "San Francisco", "state": "CA", "summary": "Over 20 years of law-firm and in-house experience. Ph.D. from the University of Oxford, and J.D. from University of California College of the Law, San Francisco. Vast experience managing IP portfolios for diverse US and international clients. Serving on the boards of numerous technology companies focusing on biotech, AI and carbon capture. Founder of www.iplegaled.com, the No.1 IP paralegal training course in the US. Passionate about justice, education, the environment and creating a better world for our children.", "headshot": "Picture"}, {"name": "David McConnell", "firm": "Perkins Thompson, P.A.", "city": "Portland", "state": "ME", "summary": "Dave McConnell has advised food and beverage makers, restaurant owners, creative content producers and entrepreneurs in many other businesses since 1995. As the co-founder of a Portland distillery, Dave understands the range of challenges faced by business owners. Dave's clients appreciate his keen sense for practical solutions and sound business advice as much as his legal expertise as he helps them deftly navigate data privacy and protection questions, trademark and copyright licensing, complex local, state and federal regulatory requirements and other mission-critical matters.", "headshot": "Picture"}, {"name": "The Iwashko Law Firm, PLLC", "firm": "The Iwashko Law Firm, PLLC", "city": "Washington", "state": "DC", "summary": "Mr. Iwashko, the owner of The Iwashko Law Firm, has been working in the field of intellectual property law for over two decades, and has drafted patent applications in various fields of technology. Mr. Iwashko and his staff take great pride in establishing personal connections with inventors, while being able to draft their patent applications expeditiously, secure quality patent registrations, strategize about \"catchy\" trademarks/slogans, and if needed, provide representation in Federal Court in patent and/or trademark infringement cases. Ultimately, the Iwashko Law Firm is \"the one stop shop for your intellectual prop\".", "headshot": "Picture"}, {"name": "Michael Jones", "firm": "Jones Intellectual Property", "city": "Brooklyn", "state": "NY", "summary": "Michael Jones is an intellectual property attorney and the founder of Jones IP Law, with a practice focused on patent and trademark prosecution, copyright registration, and IP litigation. He helps inventors, startups, and growing businesses protect, manage, and enforce their intellectual property with practical, business-focused legal strategies.", "headshot": "Picture"}, {"name": "David L. Cohen", "firm": "David L. Cohen, P.C.", "city": "New York City", "state": "NY", "summary": "David Cohen launched his law firm, David L. Cohen, P.C., and his consultancy, Kidon IP, in 2017. His goal is to bring sophisticated legal and IP management services to his clients. A graduate of Northwestern University Pritzker School of Law, Attorney Cohen is experienced in handling and consulting on cases that cover a variety of IP and business matters especially patent portfolio development, monetization, and negotiation. David is a member of the State Bar of New York, the State Bar of New Jersey, the District of Columbia Bar, and is licensed to practice before the United States Patent and Trademark Office (USPTO).", "headshot": "Picture"}, {"name": "Gregory Donald Carson", "firm": "Carson Patents\u00ae", "city": "Rancho Cucamonga", "state": "CA", "summary": "Greg is a USPTO-registered patent attorney who helps innovators protect and commercialize their ideas with clear, practical IP strategy. He works closely with founders and technical teams to turn complex inventions into strong, business-aligned patent assets.", "headshot": "Picture"}, {"name": "John Laurence", "firm": "TCP Law, PLLC", "city": "New York", "state": "NY", "summary": "John Laurence is a distinguished attorney with a rich background in both engineering and law. Earning his BS in Electrical Engineering from NYU Tandon School of Engineering, John then pursued a JD from New York Law School and an LLM in Intellectual Property and Technology Law from Fordham University. He holds admission to the New York State Bar, registration with the US Patent and Trademark Office, and membership in the District Court for the Southern District of New York.", "headshot": "Picture"}, {"name": "John B. Hudak", "firm": "Law Office of John B. Hudak, PLLC", "city": "Milford", "state": "CT", "summary": "John B. Hudak is a Connecticut and New York attorney registered with the USPTO who handles patent, trademark, copyright, litigation, contract, and IP transaction matters. His prior work includes utility patents for medical devices, sports equipment, and optical mounting technology, as well as IP work for clients in food products, clothing, personal care, chemical processing, health care, and other business categories.", "headshot": "Picture"}, {"name": "Bela Malik, Ph.D", "firm": "Affordable Patent Agency, LLC", "city": "Dallas", "state": "TX", "summary": "I help innovators, startups, and growth-stage companies develop practical intellectual property strategies that align with their business and investment goals. My work focuses on patents, commercialization strategy, and the protection of technical innovations in emerging technologies, biotechnology, and process-driven platforms. I aim to provide clear, business-oriented guidance that balances legal protection with long-term competitive value.", "headshot": "Picture"}, {"name": "Michael Cohen", "firm": "Cohen IP Law Group, PC", "city": "Los Angeles", "state": "CA", "summary": "Michael N. Cohen is a U.S. patent attorney and founder of Cohen IP Law Group, PC, with over 25 years of experience helping inventors, startups, and product based companies secure and protect valuable patent rights. The firm focuses heavily on utility and design patent strategy, patent drafting and prosecution, product protection, and intellectual property enforcement, with substantial experience guiding clients from concept development through commercialization and licensing. Cohen IP Law Group also assists clients with related trademark, copyright, and trade secret matters to provide comprehensive intellectual property protection for innovative products and brands.", "headshot": "Picture"}, {"name": "Brian Klein", "firm": "Fast Forward Law, LLC", "city": "St. Louis", "state": "MO", "summary": "Brian is an intellectual property lawyer and registered patent attorney who enjoys collaborating with inventors and creators to launch their ideas into the world. Brian's firm, Fast Forward Law, LLC, focusses on clients' needs first. We are ready to work hand in hand with you to support your most important initiatives.", "headshot": "Picture"}, {"name": "Patricia Wenger", "firm": "Wenger Law Offices", "city": "West Chester", "state": "PA", "summary": "I have been practicing exclusively intellectual property law for the past 20 years. I chose intellectual property law because I love the spark of creation. I am genuinely energized by guiding entrepreneurs as they turn ideas into business assets while navigating the unique challenges of building market recognition and capturing value through patents, trademarks, copyrights, trade secrets, and licensing.", "headshot": "Picture"}, {"name": "Leon D. Bass", "firm": "Leon Bass Law", "city": "nan", "state": "OH", "summary": "Leon has established a distinguished reputation in intellectual property law. His expertise spans trademarks, copyrights, trade secrets, media and entertainment law, sponsorship and sweepstakes law, franchise law, convention and trade show matters, podcasts, right of publicity/name and likeness matters, and start-ups, business, and contract law. He also has extensive experience in litigation within these areas. Leon is rated by Super Lawyers and The Best Lawyers in America, ranked in the top 5 percent of private practice attorneys nationwide.", "headshot": "Picture"}, {"name": "Sean T. Bradley", "firm": "Bradley IP, LLC", "city": "Kansas City", "state": "MO", "summary": "Mr. Bradley's practice includes patent and trademark searches, preparation of patent applications, preparation of trademark and copyright applications for registration, prosecution of applications in the United States Patent and Trademark Office, client counseling, litigation, and other aspects of intellectual property law such as drafting license agreements and non-disclosure agreements.", "headshot": "Picture"}, {"name": "Ann Dennen", "firm": "Dennen IP Law, LLC", "city": "Huntsville", "state": "AL", "summary": "I work closely with my clients in understanding their intellectual property needs. I thrive on developing lasting relationships with my clients to create a productive work dynamic. I strive to be available quickly when my services are needed by established clients.", "headshot": "Picture"}, {"name": "Ashley Johnson", "firm": "Dogwood Patent and Trademark Law", "city": "Raleigh", "state": "NC", "summary": "Ashley Johnson is a patent and trademark attorney focused on helping businesses, inventors, and entrepreneurs protect and grow their brands and innovations. She works closely with clients on U.S. trademark filings, patent applications, Office Action responses, licensing, and IP strategy with a practical, business-focused approach.", "headshot": "Picture"}, {"name": "Kevin Prince", "firm": "QuickPatents, LLC", "city": "Las Vegas", "state": "NV", "summary": "Kevin Prince is a UC Berkeley-trained engineer, inventor, author of The Art of the Patent, and co-founder of Inventors Forum, a long-running nonprofit that has helped inventors since 1990. A patent holder himself and former president of Grid Art whose products were featured on QVC and sold through Michaels and Hobby Lobby Kevin combines real-world business success with decades of patent experience. Through QuickPatents, he works with a team of former USPTO examiners, engineers, draftsmen, and researchers to help inventors secure strong patent protection.", "headshot": "Picture"}, {"name": "Cislo & Thomas LLP", "firm": "Cislo & Thomas LLP", "city": "Los Angeles", "state": "CA", "summary": "Thomas LLP is a full-service intellectual property law firm, specializing in patent, copyright, and trademark litigation and providing Quality Client Care since 1979.", "headshot": "nan"}, {"name": "Alan Harrison", "firm": "Sandollar Law", "city": "Milford", "state": "CT", "summary": "Small business + IP lawyer. 20 years experience with patenting electromechanical inventions, ranging from toaster control circuits and firearms to jet engine components.", "headshot": "Picture"}, {"name": "Steve Murray", "firm": "Panitch Schwarze Belisario & Nadel", "city": "Philadelphia", "state": "PA", "summary": "Steve has been collaborating with innovators for twenty years and leverages his ongoing litigation and post-grant challenge experience to craft high quality and effective patents. Steve's physics background gives him the versatility to handle a diverse range of technologies and to adapt the patent application process to fit the specific needs of your business.", "headshot": "Picture"}, {"name": "Kevin Crosby", "firm": "The Rubin Firm", "city": "Stuart", "state": "FL", "summary": "We help businesses identify, secure and enforce their intellectual property rights through strategic trademark, patent, copyright and brand protection services. Led by a U.S. registered patent attorney who is Florida Bar Board Certified in Intellectual Property Law, we focus on helping clients lock down proprietary assets, strengthen competitive advantages, and protect their brands and innovations in the marketplace. From registration through enforcement, we provide specialized IP counsel designed to safeguard and maximize the value of intellectual property.", "headshot": "Picture"}];
const map = L.map('map').setView([39.8,-98.6],4);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
 maxZoom: 19,
 attribution: '&copy; OpenStreetMap'
}).addTo(map);

const markers=[];

async function geocode(item){
  const q = encodeURIComponent(`${item.city}, ${item.state}, USA`);
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`);
    const j = await r.json();
    if(j.length){
      const lat=parseFloat(j[0].lat), lon=parseFloat(j[0].lon);
      const img = item.headshot && item.headshot !== 'nan' ? `<img src="${item.headshot}" alt="">` : '';
      const popup = `
      <div class="card">
        ${img}
        <h3>${item.name}</h3>
        <strong>${item.firm}</strong><br>
        ${item.city}, ${item.state}
        <p>${item.summary||''}</p>
      </div>`;
      const m=L.marker([lat,lon]).addTo(map).bindPopup(popup);
      m.meta=item;
      markers.push(m);
    }
  } catch(e) {}
}

Promise.all(data.map(geocode));

document.getElementById('search').addEventListener('input', e => {
 const q=e.target.value.toLowerCase();
 markers.forEach(m=>{
   const t=(m.meta.name+' '+m.meta.firm+' '+m.meta.city+' '+m.meta.state).toLowerCase();
   if(t.includes(q)) {
      if(!map.hasLayer(m)) m.addTo(map);
   } else {
      if(map.hasLayer(m)) map.removeLayer(m);
   }
 });
});
</script>
