<html lang="en">
<head>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <style>
        /* Modern CSS Reset & Typography */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1a1e22;
        }
        #map {
            width: 100%;
            height: 100vh;
        }

        /* Sleek Modern Popup Styles */
        .leaflet-popup-content-wrapper {
            background: #1f242c !important;
            color: #f3f4f6 !important;
            border-radius: 12px !important;
            padding: 6px !important;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.5) !important;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .leaflet-popup-tip {
            background: #1f242c !important;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .leaflet-popup-close-button {
            color: #9ca3af !important;
            padding: 12px 12px 0 0 !important;
        }
        .leaflet-popup-close-button:hover {
            color: #ffffff !important;
        }

        /* Inner Popup Content Typography */
        .popup-container {
            padding: 8px 12px;
            min-width: 220px;
        }
        .popup-firm {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #38bdf8; /* Sleek Tech Blue Accent */
            margin-bottom: 4px;
        }
        .popup-title {
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            margin: 0 0 6px 0;
            line-height: 1.3;
        }
        .popup-location {
            font-size: 12px;
            color: #9ca3af;
            display: flex;
            align-items: center;
        }

        /* Custom SVG Marker Animation */
        .custom-pin {
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s ease;
        }
        .custom-pin:hover {
            transform: scale(1.15);
        }
    </style>
</head>

    <div id="map"></div>

        // 5. Loop through the array and inject custom map markers + styled overlay popups
        attorneys.forEach(attorney => {
            const marker = L.marker([attorney.lat, attorney.lng], { icon: modernIcon }).addTo(map);
            
            const popupContent = `
                <div class="popup-container">
                    <div class="popup-firm">${attorney.firm}</div>
                    <h3 class="popup-title">${attorney.name}</h3>
                    <div class="popup-location">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-right: 5px;">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                            <circle cx="12" cy="10" r="3"></circle>
                        </svg>
                        ${attorney.city}
                    </div>
                </div>
            `;
            
            marker.bindPopup(popupContent);
        });

        // 6. HubSpot Layout Fix: Force Leaflet to recalculate container bounds on dynamic tab load
        window.addEventListener('load', () => {
            setTimeout(() => {
                map.invalidateSize();
            }, 400);
        });
        
        // Handle window resizing or responsive panel expansion inside CRM dashboards
        window.addEventListener('resize', () => {
            map.invalidateSize();
        });

window.addEventListener('load', function() {

});

</body>
