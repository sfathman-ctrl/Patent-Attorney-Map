<script>
const attorneys = [{"name": "Walker Weitzel", "group": "Alloy Patent Law", "notes": "<b>Firm:</b> Alloy Patent Law<br><br><b>Summary:</b> Walker tailors his services to the needs of individual inventors and startups. This involves taking time to explain and advise, answer questions, providing reasonable flat fees, and generally being accessible and easy to work with. Prior to founding Alloy Patent Law, he spent a decade working as a mechanical engineer building tooling and machines for aircraft assembly automation.<br><br><b>Testimonial 1 (Sara):</b> Working with Alloy Patent Law has been fantastic! Walker helped me prepare, submit, refine, and subsequently get a patent approved and published, and is readily available whenever I have an IP question.<br><br><b>Testimonial 2 (Alan):</b> Walker is very knowledgeable, a great communicator and listener. Explain the options in a clear and concise way for me. Highly recommend!<br><br><b>Testimonial 3 (Chris):</b> Very happy I stumbled onto this firm's website. I had a great conversation with Walker, he is very personable and I feel confident he will help me with all my needs.", "lat": 47.6062, "lng": -122.2521}, {"name": "Joe D. Calhoun", "group": "Calhoun Law Firm", "notes": "<b>Firm:</b> Calhoun Law Firm<br><br><b>Summary:</b> Expert in obtaining and enforcing intellectual property for inventions, products, technology, and marketing materials. Expertise extends to many of the everyday endeavors encountered in starting or growing a business, making him a resource even beyond IP. Readily understandable, prompt, and cost effective services.<br><br><b>Testimonial 1 (Charles):</b> \"Many thanks to Calhoun Law Firm. After obtaining a patent for my predecessor, Joe Calhoun organized and formed our holding company for commercializing the patented technology. He ably assisted us in many development activities, which eventually resulted in a purchase of our technology. If you are considering filing or commercializing a patent I strongly suggest you contact Calhoun Law Firm!<br><br><b>Testimonial 2 (Eddie):</b> \"Joe has secured two patents for me and always stays on top of the details. He's a very honest and moral man and treated me very well. If you're looking for a patent attorney, he's a very good choice. He will listen to your idea and give an honest opinion on your chances.\"<br><br><b>Testimonial 3 (Nancy):</b> \"Joseph Calhoun did a wonderful job for my husband and me. We needed help with a business matter, and I felt very confident after speaking with him that I called the right law firm. I'm extremely happy with the work Mr Calhoun did on our behalf. He is very professional, and I highly recommend him! If I need legal help in the future, I will not hesitate to call him.\"", "lat": 39.8283, "lng": -98.4995}, {"name": "William Childs", "group": "Childs Patent Law", "notes": "<b>Firm:</b> Childs Patent Law<br><br><b>Summary:</b> William has spent over 15 years as a registered patent attorney helping clients protect their inventions with patents and their reputations with trademarks. William is praised by clients for being efficient, offering practical advice, and being easy to work with.<br><br><b>Testimonial 1 (Matthew B.):</b> William was able to work with us from an Innovation discovery meeting through to our Patent and Trademark applications. He is extremely knowledgeable in this field and easy to work with. The firm is efficient, professional, and reliable. We plan to utilize William Childs Law firm in the future for additional Patents.<br><br><b>Testimonial 2 (Robert C.):</b> William has done and continues to do an excellent for us on all our patent and trademark work. He is truly knowledgeable and can understand extremely complicated engineering work when writing the patent. We have used large, well know, expensive patent firms in the past and William has out preformed all of them. I highly recommend William's services to anyone looking for patent/trademark help.<br><br><b>Testimonial 3 (Richard B.):</b> Thorough. Responsive. Detail oriented. What more do you need from a Patent Attorney? William has helped both my company and many of my clients, and has always provided top notch service and excellent communication.", "lat": 29.7604, "lng": -95.2898}, {"name": "Donn K. Harms", "group": "American Patent & Trademark Law Center", "notes": "<b>Firm:</b> American Patent & Trademark Law Center<br><br><b>Summary:</b> Donn K. Harms has been a registered patent attorney since 1995 with experience serving solo inventors, small businesses, startups, and larger companies. In addition to his current practice, Mr. Harms has served as an Adjunct Professor at the University of California and operated businesses with as many as 200 employees for over 15 years. He brings a vast amount of practical experience in small business startup and operation.<br><br><b>Testimonial 1 (Ethan):</b> Donn and his staff are wonderful. I had an idea for an invention, and some traction for potential sales. Donn worked diligently to get my patent filed as soon as possible, allowing me to start sales within a few weeks. Donn does great work, I will be recommending him to anyone I know.<br><br><b>Testimonial 2 (Chad):</b> Donn has a wealth of experience to pull from and was able to give me strategic advice on a handful of different product ideas at various stages of development. Speaking with Donn felt like I had my own private office hours with a top professor at university and I'm forever grateful for the advice he provided. I will definitely be returning for my future patent and trademark needs.<br><br><b>Testimonial 3 (Stephen):</b> Honest, Professional and HIGHLY Knowledgeable. Could have charged me to file a patent that probably would not have ever been approved. Instead, explained why my product would have a difficult time going through the process and gave me numerous cheaper and quicker workarounds to protect my IP; and so far, they are working out great. In the process, saved me thousands of dollars and over a year of waiting time. Even though he knew within a minute of looking at my product that I would not be paying him to file a patent, he still took the time to speak with me for over an hour and shared some very valuable business tips. I would Highly recommend Donn H and his firm. If I ever develop another product to patent, I am definitely going back to American Patent and Trademark Law Center.", "lat": 32.7157, "lng": -117.0811}, {"name": "Scott Seeley", "group": "Eastgate IP", "notes": "<b>Firm:</b> Eastgate IP<br><br><b>Summary:</b> Intellectual property lawyer and registered patent attorney with years of experience helping inventors and companies protect their innovations. He began his career at one of the nation's largest IP specialty firms and brings that BigLaw experience to Eastgate IP, helping develop IP strategies tailored to each client's business objectives. Scott has been selected as a Rising Star on Super Lawyers every year from 2021-2026.<br><br><b>Testimonial 1 (Devlin):</b> I had a fantastic experience with Eastgate IP during their free consultation service. They were extremely helpful and provided honest, thoughtful advice that really helped clarify my next steps. My online meeting was comfortable and informative, and follow-up emails were just as responsive and helpful. Highly recommend if you're looking for good guidance in the IP space!<br><br><b>Testimonial 2 (Nick):</b> I can't express how good my experience with Eastgate IP was enough!! When you consider: 1) how much experience they have combined with 2) their patience and professionalism as they work with you on your product, and lastly 3) a pricing plan that makes sense - it is a bargain of a deal. When I was researching patent attorneys to work with, I wanted a group that was more personalized and able to work with my niche product versus a conglomerate/big company that wasn't fully interested in my idea. Eastgate however recognized the potential of my product and had advice for me not only on the technical aspects of filing my patent, but also as importantly on the business side of things for commercializing the product. And that's also where their character shown through as well. There were a couple of times in the process for example that I was impressed with them: they could have steered me in a direction that would have made more business sense for them, but they looked out for my own interest instead and gave me some advice that was better ultimately for me. So I have respect/trust for them on that. (And that is also why I am very comfortable with posting my recommendation.) In closing, if you are unsure of the many patent attorneys to choose from, I encourage you to reach out to Eastgate IP for a consultation on your product idea/patent as they will give you a fair opinion and will have the implementation chops to get you going.<br><br><b>Testimonial 3 (Fred):</b> Great working with Scott and Tim. Really took the time to explain things to me, especially patents are not easy to understand for an average person. High recommended and I will go back to Scott and Tim for all my future patent needs.", "lat": 47.6101, "lng": -122.1215}, {"name": "Bill Hulsey", "group": "Hulsey PC", "notes": "<b>Firm:</b> Hulsey PC<br><br><b>Summary:</b> Bill Hulsey is a patent attorney and founder of Hulsey P.C. with decades of experience helping inventors and businesses protect and commercialize new products. He has prosecuted more than 2,500 U.S. and international patents and over 1,000 trademarks across a wide range of consumer, industrial, and technology-driven markets. Bill is known for practical guidance, strong patent strategy, and helping clients anywhere in the US turn ideas into valuable, defensible intellectual property.<br><br><b>Testimonial 1 (Joe):</b> As a first-time inventor with only an idea, Mr. Hulsey and his team guided me through every step of the patent process. They answered my questions and filed my application with speed, accuracy, and wisdom. They have changed my family's lives.<br><br><b>Testimonial 2 (Michael):</b> Bill and his team are exceptional at listening to the description of a concept, advising on how to frame its value proposition, and successfully executing a strategy of domestic and international protection.<br><br><b>Testimonial 3 (Charlie):</b> Their expertise in their field is matched only by their enthusiasm to help us succeed in ours. Foresight, execution, responsiveness and success are hallmarks of our experience with Bill Hulsey and his team.", "lat": 35.1495, "lng": -89.96900000000001}, {"name": "Samar Shah", "group": "Patent Pending Made Simple", "notes": "<b>Firm:</b> Patent Pending Made Simple<br><br><b>Summary:</b> Patent Pending Made Simple is an AI-powered software platform created specifically for first-time inventors. Our unique hybrid process starts by connecting you with an expert patent attorney to establish your core patentable strategy. Once that foundation is set, our intelligent AI software empowers you to build a robust, high-quality provisional application based on that expert advice. The confidence of a legal expert and the efficiency of AI, all in one platform.", "lat": 39.8283, "lng": -98.4995}, {"name": "Josh Soloway", "group": "Soloway Group PC", "notes": "<b>Firm:</b> Soloway Group PC<br><br><b>Summary:</b> As Managing Partner of Soloway Group, Joshua Soloway advises founders, entrepreneurs, and growing businesses on trademark protection, brand strategy, and business formation. Joshua brings a business-first perspective shaped by years of experience as an attorney, entrepreneur, and former chief legal officer, helping clients make informed decisions early and avoid common structural and branding pitfalls as they scale.<br><br><b>Testimonial 1 (Gabbi):</b> The experience is unmatched. Josh and my team hit it off from the moment we contacted him. He came highly recommended, I wouldn't want to work with anybody else.<br><br><b>Testimonial 2 (Tighe):</b> Josh and his team helped me out in a big way when I was in a contract bind. I needed help proposing some new terms for a different type of engagement my firm was taking on, which included equity as a form of payment from a client for our services. It was all way over my head at first, but Josh took an hour out of his day to explain to me thewhy behind how we should structure this agreement. He was quite patient with a novice like me, and I couldn't help but feel he had my absolute best interests in mind. It just felt comfortable. He clearly listened to my problem vs. boasting about his accomplishments. He and his team truly felt like a partner committed to solving my problem. They were very fast \u2013 turning around the doc in a few days \u2013 and delightful to work with. I'd 100% work with Josh and his team again in the future!<br><br><b>Testimonial 3 (Tara):</b> Josh was incredibly knowledgeable and helped us navigate a new partnership and reimagine a complex corporate structure. I look forward to working with him again soon!", "lat": 39.8283, "lng": -98.4995}, {"name": "Nathaniel A. Wickliffe", "group": "The Inventor's Friend", "notes": "<b>Firm:</b> The Inventor's Friend<br><br><b>Summary:</b> the inventors Friend is a flat-fee legal services firm designed to help small business owners obtain the strongest possible IP protection for their ideas and inventions before taking them to market. Nate has worked with clients ranging from international corporations with large, global patent portfolios to individual inventors applying for a single patent on their first invention.<br><br><b>Testimonial 1 (Bradley):</b> Nate is an upfront, helpful, and professional attorney. He did a wonderful job with explaining the process and providing it in writing. He truly wants to assist and make sure your trademark is protected and not questioned by the USPTO. He's available to talk and provide assistance without charging for every little discussion as that is huge in my book. You will get what you need with Nate and it's much more affordable than any other service out there. Don't hesitate to contact him.<br><br><b>Testimonial 2 (Debra):</b> I've paid for other patent services in the past but will only work with Nate going forward. Not only are the calls free, but he really works with you towards a patentable idea. I'm familiar enough with the patent process because of some work background but will always work with him in the future because of his expertise. I highly recommend engaging with him for the best possible success.<br><br><b>Testimonial 3 (Ryan):</b> Nate did an incredible job on my patent. I did a lot of research before selecting a patent lawyer and couldn't be happier with my choice. He is an excellent communicator and produces high quality work. I will definitely be working with Nate on future patents of mine!", "lat": 39.8283, "lng": -98.4995}, {"name": "Joey Vitale", "group": "Indie Law", "notes": "<b>Firm:</b> Indie Law<br><br><b>Summary:</b> Joey Vitale is an award-winning trademark attorney and internationally renowned speaker. He's on a mission to give peace of mind to 100,000 entrepreneurs. Joey is the founder of Indie Law, a top-rated trademark law firm that's helped thousands of business owners protect their brands.<br><br><b>Testimonial 1 (Rocky):</b> Working with Indie Law Firm was such a positive experience! They guided me through the trademark process for Tune-in 2 Wellness with clarity, professionalism, and consistent communication. Joey, Jaime, and the entire staff are not only incredibly knowledgeable but also genuinely kind and supportive. I always felt heard, informed, and confident in their guidance. I'm so grateful for their help and would recommend them without hesitation.<br><br><b>Testimonial 2 (Courtney):</b> Never have I met a team who is so committed to see you succeed! Joey and his team make getting trademarked so simple, so easy, so effortless. You've worked hard to build your brand, so now it's time to let Indie Law help you protect it. Don't try to do this on your own. Just get with Joey and his team \u2014 they'll give you peace of mind knowing that your brand is protected and no one can take it from you.<br><br><b>Testimonial 3 (Shea):</b> Indie Law just helped me secure my second trademark and we're already in the process of getting my third! I worked with Amber and Almira and they were extremely knowledgeable, helpful, and quick to respond to my questions. If you're thinking about applying for a Trademark, I highly recommend working with the team at Indie Law. I guarantee they will save you time, not to mention the possible mistakes you could make that would delay your approval. Their service is worth every penny! I know I will be using them for my fourth trademark very soon!", "lat": 41.8781, "lng": -87.5498}, {"name": "Ben Williams", "group": "Williams Intellectual Property", "notes": "<b>Firm:</b> Williams Intellectual Property<br><br><b>Summary:</b> Ben Williams is a registered patent attorney and California-licensed lawyer with a hard-science background rooted in chemistry, biology, and physics through his work in soil science and environmental systems. He trained in patent law at a high-volume patent firm before putting himself through law school and being admitted to the California Bar in 2022, then founding Williams Intellectual Property. He is also an award-winning journalist and writer, a background that shows up in the clarity and strength of his patent work.<br><br><b>Testimonial 1 (Chris):</b> William Intellectual Property assisted in my trademark registration. I was very pleased with the team's results. Ben and team did a great job walking me through the process, expected costs, and were very quick to respond to any official responses from the US Patent and Trademark Office. I would recommend and use them again!<br><br><b>Testimonial 2 (Yannick):</b> Working with Ben and his associates at William intellectual Property has been nothing short of amazing. They are very professional, and knowledgeable in their craft. I strongly recommend Ben and his team for anyone looking to patent their ideas, and I will continue to utilize their services in the future.<br><br><b>Testimonial 3 (Walter):</b> I have been granted patents in the past as part of a corporate design team, but I could not afford these costs as an individual inventor. I found Ben during Google searches and feel very lucky. I have just received my first individual patent with Williams Intellectual Property handling all the workload based solely on my PowerPoint presentation, several calls and edit reviews. Based on this result, I am continuing to work with Ben on two additional related patents to build my portfolio of invention coverage.", "lat": 39.8283, "lng": -98.4995}, {"name": "Howard Russell", "group": "Howard Russell, Attorney at Law", "notes": "<b>Firm:</b> Howard Russell, Attorney at Law<br><br><b>Summary:</b> Howard has over 30 years of legal experience, both with larger firms and serving as a patent and trademark attorney with my own firm. He has helped hundreds of clients, large and small, to secure patent and trademark rights, including patent rights that are primarily in electronics, software, including several AI initiatives, mechanical, computer systems, and method patents.<br><br><b>Testimonial 1 (Tory Orzeck, President/Co-Founder at FUSE):</b> Not only does Howard strategically and successfully prosecute IP matters, more importantly, it's his honesty, integrity and ability to take his clients through the IP process. Having that roadmap reduces the unanticipated. If you're looking for an IP attorney that goes the extra mile and gets the job done. Go with HPR\"<br><br><b>Testimonial 2 (Coco, Creator of Cocos Organics):</b> Howard is the most understanding, kind, compassionate and professional person I've had the pleasure of working with. He truly cares about his clients and goes above and beyond!\"<br><br><b>Testimonial 3 (Nathan Thomas, President of Aperion Audio):</b> \"I've enjoyed working with Howard for years. He is the right combination of practical legal knowledge and client focus that makes me feel confident talking to him. I know I can turn to Howard for all of our Patent, Trademark and other IP issues.\"", "lat": 39.8283, "lng": -98.4995}, {"name": "Michael Dilworth", "group": "Dilworth IP", "notes": "<b>Firm:</b> Dilworth IP<br><br><b>Summary:</b> Experienced patent attorney with over 30 years protecting innovations for startups and multinational companies. Has drafted and prosecuted hundreds of patent applications across mechanical devices, chemical technologies, and consumer products, specializing in strategic patent protection that builds competitive advantages and supports commercialization goals.<br><br><b>Testimonial 1 (Brett):</b> Michael and Ryan were great to work with for my company's trademark and patent applications. I appreciated their clear and transparent communication. They made a complex process feel straightforward and much easier to navigate. Thank you!<br><br><b>Testimonial 2 (Gabriel):</b> Julie is amazing!! 100% recommend going with her! She's the only attorney I've ever worked with that is problematic free and not difficult to get a hold of! She's been helping me with trademarking for 3 years and has not missed a beat.<br><br><b>Testimonial 3 (Michael):</b> Attorney Frederick Spaeth was very helpful with our patent application and exceeded our expectations. Highly recommended!", "lat": 39.8283, "lng": -98.4995}, {"name": "Peter Weinstein", "group": "Omnus Law", "notes": "<b>Firm:</b> Omnus Law<br><br><b>Summary:</b> Peter D. Weinstein, Ph.D., J.D. leads a robust legal practice that specializes in Intellectual Property, Corprate Law, and Litigation that focuses on delivering results for clients at an affordable price in a reasonable period of time. Dr. Weinstein is also a co-founder and CEO of Circurna, Inc., developing circular RNA therapeutics. Through this role he has been involved in every aspect of starting and building a company, making him not just an attorney but an entrepreneur as well.", "lat": 30.2672, "lng": -97.6631}, {"name": "Thomas Phung", "group": "Johnson and Phung PLLC", "notes": "<b>Firm:</b> Johnson and Phung PLLC<br><br><b>Summary:</b> We are a Midwest patent and trademark law firm committed to helping clients with their Intellectual Property Law needs. Including obtaining and defending U.S. and International patents, trademark and copyright protection that fits their needs in a timely, hands-on, cost-effective manner.<br><br><b>Testimonial 1 (Taylor):</b> Thomas Phung from MN Patent Law has been indispensable to my small business. His expertise and prompt service have helped me reach my business goals in a timely fashion.I am reassured that moving forward he and his team will have my back, it is also comforting to have a trusted, kind, reliable team at the ready!Thank you for all you have done and continue to do.<br><br><b>Testimonial 2 (David):</b> I've worked with Tom for a few months on a patent for one of my products. He is a patient and courteous person. always responds to communication promptly and very transparent. He certainly looks out for your best interest and he has your interest genuinely at heart. Not something I would l say lightly about any lawyer.<br><br><b>Testimonial 3 (Elizabeth):</b> Thomas is an excellent lawyer and so helpful. I used his services to file trademarks for my online business a few years ago. I recently spoke with him again about an issue regarding intellectual property for a book I wrote. He called me back right away, remembered many details about my job and business, and provided great advice on the situation. I look forward to using his services again for any future needs and would recommend him to any small business in need of trademark or intellectual property guidance.", "lat": 44.9537, "lng": -93.01}, {"name": "Bao Tran", "group": "Patent Professional Corporation", "notes": "<b>Firm:</b> Patent Professional Corporation<br><br><b>Summary:</b> Bao Tran is a patent attorney that can protect innovation of any complexity. At PatentPC, Bao has led high stakes patent and trade secret matters, architected actionable IP strategies, and built AI enabled tools that modernize how innovators protect and commercialize their work. Known for his systems thinking and adversarial analysis, he helps founders build IP moats that scale with their ambition.<br><br><b>Testimonial 1 (Daniel):</b> \"I first contacted Bao after finding his firm through an internet search. As a solo inventor, I was looking for an attorney who could help me understand the patent landscape and assist with filing a patent for an AI invention I was developing. I feel fortunate to have found Bao. From our very first interaction, he was responsive, knowledgeable, and thorough in answering all my questions. He offered affordable services and guided me through the complexities of the patent process with clarity and professionalism. Bao managed my filings efficiently and provided support exactly where I needed it most. I would wholeheartedly recommend his services.\"<br><br><b>Testimonial 2 (Rajiv):</b> \"PatentPC's defense on my trademark filing was incredible! I thought we were dead in the water based on USPTOs initial response. Then PatentPC wrote a rebuttal that had me going from 'we're dead in the water' to 'we've got a case here!'And the response was ready within an hour of the USPTO's email. Super efficient team on top of their stuff.\"<br><br><b>Testimonial 3 (Manish):</b> \"I worked with Patent PC (Bao Tran) to file a Patent application. I am happy that I made a decision to work with Patent PC. Bao was always responsive and had clear communication and answered all my questions. He worked with me to meet my time line and manage to file Patent application to meet my aggressive schedule. Thank you Bao for your support.\"", "lat": 39.8283, "lng": -98.4995}, {"name": "Derrick Davis", "group": "Trust Tree", "notes": "<b>Firm:</b> Trust Tree<br><br><b>Summary:</b> Derrick is a Tennessee-based intellectual property attorney who helps businesses navigate questions concerning IP acquisition and enforcement. He has handled thousands of USPTO trademark filings along with over a hundred trademark disputes before the Trademark Trial and Appeal Board and federal courts throughout the United States. Derrick is an active voice in the IP community, mentoring startups through various accelerator programs and serving on the Trademark Reporter Committee of the International Trademark Association.<br><br><b>Testimonial 1 (Joshua):</b> I've used Trust Tree for dozens of trademarks. I've used every other service imaginable previously. Trust Tree is by far the easiest, most cost effective, and professional. Simple process. Great results.<br><br><b>Testimonial 2 (Alex):</b> Fast and effective - The team assisted us in setting up 2x trademarks, and dealing with them was pleasant and easy.<br><br><b>Testimonial 3 (Debbie):</b> Great service, professional, affordable, and totally on top of things (so I could focus on my work). Highly recommend for trademark facilitating!", "lat": 36.1627, "lng": -86.7016}, {"name": "Craige Thompson JD, MBA, EE, PE", "group": "Thompson Patent Law", "notes": "<b>Firm:</b> Thompson Patent Law<br><br><b>Summary:</b> Your innovation creates value when it is structured to produce revenue. Managing Principal Patent Attorney Craige Thompson leads a multidisciplinary team of experienced patent attorneys who engineer patents to be your strategic business assets so you can capture value, create leverage, and maximize ROI.<br><br><b>Testimonial 1 (Kyle):</b> If you believe you have an idea that can open a door that leads to opportunity, the least you can do is get a thorough review of the idea with an experienced patent attorney like Thompson Patent Law. They have been instrumental in showing me how to plant and nurture my seed, and I look forward to the day when my idea will bear fruit -- I truly feel it is possible through the services they offer.<br><br><b>Testimonial 2 (Mike):</b> The team at Thompson Patent Law is the BEST. They took the time to understand my \"far out\" idea when other's didn't. They asked good questions and coached me until we unlocked the novel idea that I had trouble articulating. They held my hand during the entire process, and I couldn't be happier with the end result. I will definitely be coming back for additional patents.<br><br><b>Testimonial 3 (Sam):</b> My experience with Thompson Patent Law exceeded my expectations. They demonstrated unparalleled knowledge and experience in all areas. Their organized approach streamlined the process and they were incredibly responsive to any questions I had or clarifications I required. I would highly recommend their services without hesitation.", "lat": 39.8283, "lng": -98.4995}, {"name": "Wayne Carroll", "group": "Inspired Idea Solutions", "notes": "<b>Firm:</b> Inspired Idea Solutions<br><br><b>Summary:</b> Registered patent attorney with 20+ years safeguarding clients' intellectual property. Admitted to the USPTO with expertise in patents, trademarks, trade secrets, contracts, and copyright. Board Member of the Inventors Association of Arizona, SEED SPOT mentor, and SCORE Arizona speaker.<br><br><b>Testimonial 1 (Naomi):</b> Working with Inspired Idea Solutions has given me real peace of mind around our intellectual property. They are professional, reliable, and handle details with care and precision. I especially appreciate their integrity and follow-through. If you want a firm that treats your ideas with respect and seriousness, they are an excellent choice.<br><br><b>Testimonial 2 (Carl):</b> Cannot say enough good things about my conversation with Wayne. Incredibly knowledgeable and well versed in the areas of trademarking and copyright law. He enlightened me and helped me avoid thousands of dollars in needless expenditures. I'm am indebted to Wayne and will call upon him again in the future.<br><br><b>Testimonial 3 (Jeremy):</b> Wayne was fantastic!!! As someone with a new product, he took the time to walk me through everything I needed to know about patents, trademarks, copyrights, etc. There was much more out there that could have affected me long-term that I was not aware of had. He is very knowledgeable. He took the time to listen to my ideas and then gave me the legal perspective of those. I was very appreciative of the time and knowledge that he shared and spent with me.", "lat": 39.8283, "lng": -98.4995}, {"name": "Mark Trenner", "group": "Trenner Law Firm", "notes": "<b>Firm:</b> Trenner Law Firm<br><br><b>Summary:</b> With over 25 years of experience and a strong engineering background, I provide inventors and small businesses with expert guidance to protect their innovations and brands. I prioritize a personalized, flat-fee approach so my clients can focus on growth without the stress of unpredictable billable hours.<br><br><b>Testimonial 1 (Phillip):</b> \"Consistent and Transparent. Mark has been very helpful to work with over the last 6 years. He has worked with us on filing four patents! We have been issued two and the other two are pending. We have also worked with Mark on filing our trademark.\"<br><br><b>Testimonial 2 (Ryan):</b> \"Mark did a great job assisting me with my trademark. At first, after applying on my own, my trademark was denied, but after an appeal through Mark they accepted it. If I were to do it all over again I would go through Mark at the Trenner Law Firm, LLC.\"<br><br><b>Testimonial 3 (Liesl):</b> \"We hired Mark Trenner and his law firm to help us patent our first to market product and Mark was a pleasure to work with. He was always available when we had any questions and guided us through the entire process. He made suggestions and worked with our needs as they arose. One of the great things about using Mark is his flat fee costs- knowing this was a great benefit being that we were a new company. We highly recommend Trenner Law Firm and will continue to use him in the future!\"", "lat": 39.8283, "lng": -98.4995}, {"name": "Robert McConnell", "group": "McConnell Law Firm", "notes": "<b>Firm:</b> McConnell Law Firm<br><br><b>Summary:</b> Experienced patent attorney specializing in strategic intellectual property protection. Using data driven approaches and modern patent analytics to help innovators secure their ideas and build competitive advantages in the marketplace.<br><br><b>Testimonial 1 (Wei):</b> I've been working with Robert at McConnell Law Firm, P.C. for 2 years on patent and trademark matters, and it's been a really smooth experience. He's knowledgeable, reliable, and genuinely easy to work with. He breaks everything down in a clear, step-by-step way, so you always know what's happening and what to expect. He's also quick to respond and super helpful whenever questions come up. Highly recommend!<br><br><b>Testimonial 2 (Anne):</b> As a small business owner, I'm very grateful to have found Robert to assist us with trademark filings and IP guidance. I tend to have many questions, and he is always personable, patient, thorough, and clear, and takes the time to update me in detail. I also greatly appreciate that his pricing is structured simply and explained at the outset. Highly recommend McConnell Law Firm!<br><br><b>Testimonial 3 (Chris):</b> My experience working with Robert for trademarks has been excellent. He's incredibly organized, walked me through the trademark search process clearly, and was very transparent about pricing from the start. I appreciate his automated follow-ups on office actions, which make keeping up with the long application process stress-free. Highly recommend!", "lat": 34.0522, "lng": -118.1637}, {"name": "Marcos E. Garciaacosta", "group": "Marcos E. Garciaacosta Law Group", "notes": "<b>Firm:</b> Marcos E. Garciaacosta Law Grou ear and a half later I can further say that Patrick's drive, integrity, and passion for his craft are evident in every interaction that I have had with him - without exception. What makes Patrick special is that he combines creativity and enthusiasm with a knowledge of the world of IP that is as detailed as it is vast.<br><br><b>Testimonial 3 (Former Client):</b> Very informative. Took the time to explain all my options so I could fully understand and make a informed decision. Fully understood what I envisioned in my head and put it on paper in full detail. Extremely professional and would recommend his services to anyone.", "lat": 41.92963741497902, "lng": -87.56861262501724}, {"name": "Adam Bell", "group": "Bell IP Law", "notes": "<b>Firm:</b> Bell IP Law<br><br><b>Summary:</b> Over 20 years of law-firm and in-house experience. Ph.D. from the University of Oxford, and J.D. from University of California College of the Law, San Francisco. Vast experience managing IP portfolios for diverse US and international clients. Serving on the boards of numerous technology companies focusing on biotech, AI and carbon capture. Founder of www.iplegaled.com, the No.1 IP paralegal training course in the US. Passionate about justice, education, the environment and creating a better world for our children.<br><br><b>Testimonial 1 (Saikat):</b> Working with Adam was an outstanding experience. He was incredibly responsive and thorough from our very first conversation. He made the entire patent process feel straightforward and manageable. I was particularly impressed with his transparency regarding costs and his thoughtful approach to presenting all available options. He ultimately recommended the most efficient and cost-effective path for my situation, which I greatly appreciated. I highly recommend his services for anyone needing a knowledgeable and trustworthy patent attorney.<br><br><b>Testimonial 2 (Earl):</b> We engaged Adam and company to start the Trademark process for our aspiring business beginning. Adam and company were not only extremely knowledgeable, they were very efficient and welcoming. I would and will recommend these folks for anyone inquiring about Trademark procedures now and in the future. Thank you Bell IP Law for making our first experience a pleasant one.<br><br><b>Testimonial 3 (Alina):</b> We had an excellent experience working with Bell IP Law. The level of professionalism, responsiveness, and clarity exceeded all expectations. Special thanks to Adam for his outstanding communication, flexibility, and efficiency throughout the process. We're truly grateful for such a smooth and effective collaboration on our IP matters. Highly recommended!", "lat": 37.7749, "lng": -122.3394}, {"name": "David McConnell", "group": "Perkins Thompson, P.A.", "notes": "<b>Firm:</b> Perkins Thompson, P.A.<br><br><b>Summary:</b> Dave McConnell has advised food and beverage makers, restaurant owners, creative content producers and entrepreneurs in many other businesses since 1995. As the co-founder of a Portland distillery, Dave understands the range of challenges faced by business owners. Dave's clients appreciate his keen sense for practical solutions and sound business advice as much as his legal expertise as he helps them deftly navigate data privacy and protection questions, trademark and copyright licensing, complex local, state and federal regulatory requirements and other mission-critical matters.", "lat": 43.6591, "lng": -70.1768}, {"name": "The Iwashko Law Firm, PLLC", "group": "The Iwashko Law Firm, PLLC", "notes": "<b>Firm:</b> The Iwashko Law Firm, PLLC<br><br><b>Summary:</b> Mr. Iwashko, the owner of The Iwashko Law Firm, has been working in the field of intellectual property law for over two decades, and has drafted patent applications in various fields of technology. Mr. Iwashko and his staff take great pride in establishing personal connections with inventors, while being able to draft their patent applications expeditiously,  Iwashko's work? (1) He cares about his clients and sets your interests as his. He works for your best result and does not \"nickel and dime\" you for every little thing. He treats large and small clients with the same care and respect. (2) Mr. Iwashko knows patent and trademark law. Period. Inside and Out. He has spent countless time explaining the law to me to make sure that we make informed decisions in some challenging situations. (3) Mr. Iwashko's communications skills (writing/speaking/presenting) are the best I have seen in the legal profession. (4) Creativity - every time we submit a new invention, Mr. Iwashko adds to the value of the intellectual property by viewing the invention from multiple angles and actually increases the value of the invention through making the patent stronger. Finally, in my first small business venture, we were concerned when our business name was challenged by another company. Mr. Iwashko guided us through a 2 year process where we ultimately achieved the most desired outcome.", "lat": 39.8283, "lng": -98.4995}, {"name": "Michael Jones", "group": "Jones Intellectual Property", "notes": "<b>Firm:</b> Jones Intellectual Property<br><br><b>Summary:</b> Michael Jones is an intellectual property attorney and the founder of Jones IP Law, with a practice focused on patent and trademark prosecution, copyright registration, and IP litigation. He helps inventors, startups, and growing businesses protect, manage, and enforce their intellectual property with practical, business-focused legal strategies.<br><br><b>Testimonial 1 (Cody):</b> Michael was great to work with throughout my trademark dispute. He was responsive, clear in his communication and did a great job with negotiations and guiding me through the process. He was able to resolve my dispute smoothly and for a fair price. Would highly recommend him for anyone need IP legal help!<br><br><b>Testimonial 2 (Brian):</b> Michael is an exceptional patent attorney\u2014thorough, responsive, and deeply knowledgeable. He guided my utility patent from provisional to full filing with clarity and precision, always keeping both the legal and strategic big picture in view. I couldn't have asked for better representation and highly recommend him to anyone seeking trustworthy, high-caliber IP counsel.<br><br><b>Testimonial 3 (Gary):</b> Mike has done an amazing job helping me through the patenting process. He is prompt and professional with all business matters and has been a pleasure to communicate with. I would highly recommend him to others.", "lat": 39.8283, "lng": -98.4995}, {"name": "David L. Cohen", "group": "David L. Cohen, P.C.", "notes": "<b>Firm:</b> David L. Cohen, P.C.<br><br><b>Summary:</b> David Cohen launched his law firm, David L. Cohen, P.C., and his consultancy, Kidon IP, in 2017. His goal is to bring sophisticated legal and IP management services to his clients. A graduate of Northwestern University Pritzker School of Law, Attorney Cohen is experienced in handling and consulting on cases that cover a variety of IP and business matters especially patent portfolio development, monetization, and negotiation. David is a member of the State Bar of New York, the State Bar of New Jersey, the District of Columbia Bar, and is licensed to practice before the United States Patent and Trademark Office (USPTO).<br><br><b>Testimonial 1 (Julia):</b> David Cohen did an outstanding job helping me develop my patent portfolio. He took my initial patent pending application and successfully guided it through to a granted utility patent. From there, he helped me strategically build out a comprehensive patent portfolio based on that foundation. David's expertise in patent prosecution and portfolio development was evident throughout the process. He was professional, knowledgeable, and provided clear guidance at every step. His strategic approach helped me maximize the value of my intellectual property and create strong protection for my innovations. I highly recommend David Cohen to anyone looking for skilled patent counsel who can both execute individual filings and think strategically about long-term IP protection. I am forever grateful for David's help, guidance, and impeccable work.<br><br><b>Testimonial 2 (Chris):</b> As a former attorney turned startup founder, I found David to be an incredible pleasure to work with. Despite having a full plate with bigger and more sophisticated clients, David gave our startup incredible attention and scale-appropriate strategies.<br><br><b>Testimonial 3 (Pierre):</b> I've worked with David for years no through various new patents, for legal advice and contract matters, and he continues to manage our IP portfolio. Working with him is always a pleasure - he is quick to grasp complicated concepts, his first drafts are always quite good (and if you've worked with many IP lawyers, you know that this ISN'T a given), and he follows through quite well, remaining on top of international portfolios so that items do not get dropped unintentionally. Importantly, David has fair rates, and tends to work on documents with flat fees stated up front. I've never been hit by a surprise fee from David - if something comes up he communicates it up front so that I am better equipped to make a decision on the way forward. I recommend him highly.", "lat": 39.879837414979015, "lng": -98.51831262501723}, {"name": "Gregory Donald Carson", "group": "Carson Patents\u00ae", "notes": "<b>Firm:</b> Carson Patents\u00ae<br><br><b>Summary:</b> Greg is a USPTO-registered patent attorney who helps innovators protect and commercialize their ideas with clear, practical IP strategy. He works closely with founders and technical teams to turn complex inventions into strong, business-aligned patent assets.<br><br><b>Testimonial 1 (Andrew):</b> \"Absolutely fantastic company and great value/prices. Greg and his team are best in class. Great insight and timely execution. Highly recommend for any patent related services.\"<br>< ponses AND he was extremely reasonable with costs. This is especially helpful in an economic climate where cost gauging is a problem, especially for young start-ups without any money. It was a pleasure to have him provide these services for us and I would highly recommend him to anyone.\"<br><br><b>Testimonial 2 (Sondra):</b> \"I could not have found a more knowledgeable patent attorney. Brian made me feel comfortable and safe at our first meeting. He had answers to all my questions and went through all the steps needed to get my patent filed. He got to work on it quickly and had the patent filed within a week. His 10 page explanation to the patent office was mind blowing. Brian understood my vision and presented it eloquently. I thank God that someone referred him to me. He is amazing and by the time of filing I felt I had a new friend.\"<br><br><b>Testimonial 3 (Sandy):</b> \"Brian Klein, President of Fast Forward Law, is an awesome person to do business with! He is filled with integrity and focused on the customer. I am Grateful that I met him and was able to work with him!!\"", "lat": 39.8283, "lng": -98.4995}, {"name": "Patricia Wenger", "group": "Wenger Law Offices", "notes": "<b>Firm:</b> Wenger Law Offices<br><br><b>Summary:</b> I have been practicing exclusively intellectual property law for the past 20 years. I chose intellectual property law because I love the spark of creation. I am genuinely energized by guiding entrepreneurs as they turn ideas into business assets while navigating the unique challenges of building market recognition and capturing value through patents, trademarks, copyrights, trade secrets, and licensing.", "lat": 39.8283, "lng": -98.4995}, {"name": "Leon D. Bass", "group": "Leon Bass Law", "notes": "<b>Firm:</b> Leon Bass Law<br><br><b>Summary:</b> Leon has established a distinguished reputation in intellectual property law. His expertise spans trademarks, copyrights, trade secrets, media and entertainment law, sponsorship and sweepst
