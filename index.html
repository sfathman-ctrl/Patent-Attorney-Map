const map=L.map('map').setView([39,-98],4);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
const bounds=[];
const icon=L.divIcon({html:'<div style="width:16px;height:16px;background:#b3001b;border:3px solid white;border-radius:50%"></div>',className:'',iconSize:[22,22]});

data.forEach((a,i)=>{
 fetch('https://nominatim.openstreetmap.org/search?format=json&q='+encodeURIComponent(a.address))
 .then(r=>r.json()).then(res=>{
   if(!res.length) return;
   const lat=+res[0].lat, lon=+res[0].lon;
   bounds.push([lat,lon]);
   const popup=`<h3>${a.name}</h3>${a.notes}<br><br><a class="btn" target="_blank" href="${a.link}">Website</a>`;
   L.marker([lat,lon],{icon}).addTo(map).bindPopup(popup);
   if(bounds.length>1) map.fitBounds(bounds);
 });
});
