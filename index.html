<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patent Attorney Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
        body {
            margin: 0;
            padding: 0;
        }
        #map {
            width: 100%;
            height: 100vh; /* Takes up the whole screen */
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script>
        // 1. Initialize the map centered on the United States
        const map = L.map('map').setView([37.8, -96], 4);

        // 2. Add the OpenStreetMap tile layer
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 3. Your Patent Attorney Data
        const attorneys = [
            { name: "John Doe", firm: "IP Partners", lat: 38.9072, lng: -77.0369, city: "Washington, DC" },
            { name: "Jane Smith", firm: "Patent Pros", lat: 34.0522, lng: -118.2437, city: "Los Angeles, CA" },
            { name: "Alex Jones", firm: "Innovation Law", lat: 41.8781, lng: -87.6298, city: "Chicago, IL" }
            // You can easily add more attorneys to this list following the same format!
        ];

        // 4. Loop through the data and place markers on the map
        attorneys.forEach(attorney => {
            const marker = L.marker([attorney.lat, attorney.lng]).addTo(map);
            
            // Create a popup window when a marker is clicked
            marker.bindPopup(`
                <strong>${attorney.name}</strong><br>
                ${attorney.firm}<br>
                <small>${attorney.city}</small>
            `);
        });
    </script>
</body>
</html>
