<style>
  /* THE FIX: Stop HubSpot from forcing responsive image scaling on map tiles */
  .leaflet-container img.leaflet-tile {
    max-width: none !important;
    max-height: none !important;
    width: 256px !important; /* Forces absolute Leaflet tile dimensions */
    height: 256px !important;
    padding: 0 !important;
    margin: 0 !important;
  }

  /* Secure container boundaries */
  .hubspot-map-shield {
    width: 100% !important;
    height: 600px !important; 
    position: relative !important;
    background: #111827 !important; 
  }

  #map { 
    width: 100% !important; 
    height: 100% !important; 
  }

  /* Standard Popup Styles */
  .leaflet-popup-content-wrapper { background: #1f242c !important; color: #f3f4f6 !important; border-radius: 12px !important; padding: 6px !important; }
  .leaflet-popup-tip { background: #1f242c !important; }
  .popup-container { padding: 8px 12px; min-width: 220px; }
  .popup-firm { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #38bdf8; margin-bottom: 4px; }
  .popup-title { font-size: 16px; font-weight: 600; color: #ffffff; margin: 0 0 6px 0; }
  .popup-location { font-size: 12px; color: #9ca3af; }
  .custom-pin { display: flex; justify-content: center; align-items: center; }
</style>
