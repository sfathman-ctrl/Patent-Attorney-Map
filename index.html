<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My OpenFreeMap</title>
    
    <!-- 1. Include MapLibre GL JS and CSS -->
    <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css" rel="stylesheet" />
</head>
<body>

    <!-- 2. Create a div container where the map will sit -->
    <div id="map" style="width: 100%; height: 500px"></div>

    <!-- 3. Initialize the map using your chosen Positron style -->
    <script>
      const map = new maplibregl.Map({
        container: 'map',
        style: 'https://tiles.openfreemap.org/styles/positron', 
        center: [13.388, 52.517], // [Longitude, Latitude] (Currently set to Berlin)
        zoom: 9.5
      });
    </script>

</body>
</html>
