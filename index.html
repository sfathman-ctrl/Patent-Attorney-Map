<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My OpenFreeMap with Markers</title>
    
    <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css" rel="stylesheet" />
</head>
<body>

    <div id="map" style="width: 100%; height: 500px"></div>

    <script>
      // Initialize the map
      const map = new maplibregl.Map({
        container: 'map',
        style: 'https://tiles.openfreemap.org/styles/positron', 
        center: [13.388, 52.517], 
        zoom: 9.5
      });

      // 1. Create a popup 
      const popup = new maplibregl.Popup({ offset: 25 })
        .setText('Hello! This is a marker on OpenFreeMap.');

      // 2. Create the marker and attach the popup
      const marker = new maplibregl.Marker({ color: '#FF0000' }) // You can change the pin color here
        .setLngLat([13.388, 52.517]) 
        .setPopup(popup) // Binds the popup to this marker
        .addTo(map);
    </script>

</body>
</html>
